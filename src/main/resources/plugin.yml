name: MoodBusiness
version: 1.0.0
main: fr.moodcraft.business.Main
api-version: '1.21'
author: MoodCraft

depend:
  - Vault

softdepend:
  - Towny
  - MoodAuth
  - MoodCraftBridge
  - MoodTownMenu

commands:
  entreprise:
    description: Ouvre le Bureau des Entreprises MoodCraft.
    aliases:
      - business
      - company
      - societe
      - société
    usage: /entreprise

  entrepriseadmin:
    description: Gestion admin des entreprises MoodCraft.
    aliases:
      - ebadmin
      - businessadmin
    usage: /entrepriseadmin
    permission: moodbusiness.staff
    permission-message: "§c✖ §fAccès réservé à l'administration économique."

  businessstaff:
    description: Outils staff avancés MoodBusiness.
    aliases:
      - bstaff
      - entrstaff
      - entreprisestaff
    usage: /businessstaff
    permission: moodbusiness.staff
    permission-message: "§c✖ §fAccès réservé à l'administration économique."

  demandes:
    description: Ouvre les demandes du Bureau des Entreprises.
    aliases:
      - demande
      - requests
      - request
    usage: /demandes

  demandesadmin:
    description: Gestion admin des demandes joueurs.
    aliases:
      - demandeadmin
      - requestadmin
      - reqadmin
    usage: /demandesadmin <list|clear> <joueur>
    permission: moodbusiness.staff
    permission-message: "§c✖ §fAccès réservé à l'administration économique."

  contrat:
    description: Ouvre les contrats du Bureau des Entreprises.
    aliases:
      - contrats
      - contract
      - contracts
    usage: /contrat

permissions:
  moodbusiness.create:
    description: Permet de créer une entreprise.
    default: true

  moodbusiness.staff:
    description: Accès à la gestion staff du Bureau des Entreprises.
    default: op

  moodbusiness.staff.suspend:
    description: Permet de suspendre, réactiver ou archiver une entreprise.
    default: op

  moodbusiness.staff.litige:
    description: Permet de gérer les litiges des contrats.
    default: op

  moodbusiness.staff.tax:
    description: Permet de consulter l'historique des taxes.
    default: op

  moodbusiness.bypass:
    description: Ignore certaines limites anti-abus.
    default: op